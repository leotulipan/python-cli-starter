name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --group dev
        working-directory: python-cli

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .
        working-directory: python-cli

      - name: Type check
        run: uv run mypy src
        working-directory: python-cli

      - name: Tests
        run: uv run pytest
        working-directory: python-cli
